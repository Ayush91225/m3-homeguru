<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scientific Calculator</title>
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=e2d40e1a3fc64221b0cbc16964334674"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #calculator { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="calculator"></div>
    <script>
        let calc = null;
        let isRemote = false;
        let lastState = '';
        let pollInterval = null;

        function init() {
            calc = Desmos.ScientificCalculator(document.getElementById('calculator'));
            
            // Poll for state changes (scientific calc has no observeEvent)
            pollInterval = setInterval(() => {
                if (!isRemote) broadcastState();
            }, 1000);
        }

        function broadcastState() {
            if (!calc) return;
            try {
                const state = calc.getState();
                const json = JSON.stringify(state);
                if (json === lastState) return;
                lastState = json;
                CalcSync.postMessage(json);
            } catch (e) {}
        }

        function receiveState(state) {
            if (!calc) return;
            isRemote = true;
            try {
                calc.setState(state);
                lastState = JSON.stringify(state);
            } catch (e) {}
            setTimeout(() => { isRemote = false; }, 300);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
