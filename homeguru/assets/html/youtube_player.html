<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent;
            overflow: hidden;
        }
        #player {
            width: 100%;
            height: 100vh;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #666;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="player"></div>
    <div id="loading" class="loading">Loading video...</div>

    <script>
        const API_KEY = 'AIzaSyCWqO_1RClvR_tEN0UWzaqsNa5XCK0LNWw';
        let player;
        let videoId = '';

        // Extract video ID from URL
        function getVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Load YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Initialize player when API is ready
        function onYouTubeIframeAPIReady() {
            // Wait for video URL from Flutter
            window.addEventListener('message', function(event) {
                const data = event.data;
                if (data.action === 'loadVideo') {
                    videoId = getVideoId(data.url);
                    if (videoId) {
                        if (player) {
                            player.loadVideoById(videoId);
                        } else {
                            createPlayer(videoId);
                        }
                    }
                } else if (data.action === 'play') {
                    if (player) player.playVideo();
                } else if (data.action === 'pause') {
                    if (player) player.pauseVideo();
                } else if (data.action === 'stop') {
                    if (player) player.stopVideo();
                }
            });

            // Signal ready to Flutter
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onReady');
            }
        }

        function createPlayer(videoId) {
            document.getElementById('loading').style.display = 'none';
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'controls': 1,
                    'showinfo': 0,
                    'fs': 1,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onPlayerReady');
            }
        }

        function onPlayerStateChange(event) {
            const states = {
                '-1': 'unstarted',
                '0': 'ended',
                '1': 'playing',
                '2': 'paused',
                '3': 'buffering',
                '5': 'cued'
            };
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onStateChange', states[event.data] || 'unknown');
            }
        }

        function onPlayerError(event) {
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onError', event.data);
            }
        }

        // Fetch video metadata using YouTube Data API v3
        async function getVideoMetadata(videoId) {
            try {
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${videoId}&key=${API_KEY}`
                );
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    return data.items[0];
                }
                return null;
            } catch (error) {
                console.error('Error fetching video metadata:', error);
                return null;
            }
        }
    </script>
</body>
</html>
